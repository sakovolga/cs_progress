spring:
  application:
    name: cs_progress
    
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false  # ← ВАЖНО для батчинга!
      data-source-properties:
        reWriteBatchedInserts: true  # ← Для оптимизации PostgreSQL
  
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        generate_statistics: false
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
          batch_versioned_data: true
        connection:
          provider_disables_autocommit: true  # ← ВАЖНО для Hibernate
        current_session_context_class: thread  # ← Для правильного управления сессией
        
  ai:
    openai:
      enabled: true
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4.1-mini
          temperature: 0.7
          max-tokens: 4096
  # ============= RABBITMQ НАСТРОЙКИ =============
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /
    
    listener:
      simple:
        message-converter: jackson2JsonMessageConverter
        # Количество параллельных обработчиков
        concurrency: 3
        max-concurrency: 10
        # Количество сообщений, получаемых за раз
        prefetch: 10
        # Автоматическое acknowledge
        acknowledge-mode: auto
        # Retry настройки
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 3
          multiplier: 2.0
          max-interval: 10000
  
server:
  port: ${SERVER_PORT:8083}

# Кастомные настройки DLQ
app:
  rabbitmq:
    dlq:
      max-retries: 3
      alert-threshold: 50
      cleanup-hours: 48  # Через 48 часов удалять из DLQ
      
internal:
  secret: ${CS_SECRET}